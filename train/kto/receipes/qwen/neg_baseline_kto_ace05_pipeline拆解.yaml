# Model arguments
# model_name_or_path: xxx
model_name_or_path: xxx

model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2
bf16: true
tf32: true
output_dir: runs_other_rl/baseline_kto/qwen3_pipeline拆解_ACE05-1e-6

dataset_id_or_path: xxx/get_dpo_and_kto_data/ACE05/KTO/qwen3_pipeline拆解.jsonl

# Lora Arguments
# No LoRA is used here
use_peft: true
lora_r: 8
lora_alpha: 16
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
load_in_4bit: true

# Training arguments
max_steps: -1
per_device_train_batch_size: 6
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 1e-6 # 1.0e-6 as in the deepseek math paper 5-e7 from https://hijkzzz.notion.site/unraveling-rlhf-and-its-variants-engineering-insights#147d9a33ecc9806090f3d5c749d31f05
num_train_epochs: 8
lr_scheduler_type: cosine
warmup_ratio: 0.03
# GRPO specific parameters
beta: 0.001 # 0.04 as in the deepseek math paper 0.001 from https://hijkzzz.notion.site/unraveling-rlhf-and-its-variants-engineering-insights#147d9a33ecc9806090f3d5c749d31f05
max_prompt_length: 600
max_completion_length: 650
num_generations: 6
trust_remote_code: true

# use_vllm: false
use_vllm: true
vllm_device: "cuda:0"
vllm_gpu_memory_utilization: 0.55
vllm_max_model_len: 1500
temperature: 0.7
# Logging arguments
logging_strategy: steps
logging_steps: 2
report_to:
- tensorboard
save_strategy: "steps"
save_steps: 100
seed: 42

# Hugging Face Hub 
push_to_hub: false
  # hub_model_id: llama-3-1-8b-math-orca-qlora-10k-ep1 # if not defined same as output_dir
